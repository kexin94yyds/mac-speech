<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iterate-speech 底边语音条原型</title>
    <style>
      :root {
        --bg: #f3f1ed;
        --panel: rgba(255, 255, 255, 0.78);
        --panel-strong: rgba(255, 255, 255, 0.92);
        --ink: #191612;
        --muted: rgba(25, 22, 18, 0.52);
        --line: rgba(25, 22, 18, 0.08);
        --accent: #ff9e5c;
        --accent-2: #ff7f3f;
        --shadow: 0 28px 80px rgba(60, 37, 18, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        font-family: "SF Pro Display", "PingFang SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 180, 117, 0.4), transparent 32%),
          radial-gradient(circle at bottom right, rgba(230, 203, 171, 0.62), transparent 28%),
          linear-gradient(180deg, #f6f2ea 0%, #f0ece6 100%);
      }

      .desktop {
        position: relative;
        min-height: 100vh;
        padding: 28px;
      }

      .floating-note {
        width: min(440px, 38vw);
        border-radius: 28px;
        padding: 22px 24px;
        background: rgba(255, 255, 255, 0.54);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 18px 50px rgba(48, 34, 18, 0.08);
        backdrop-filter: blur(24px);
      }

      .floating-note h1 {
        margin: 0;
        font-size: 26px;
      }

      .floating-note p {
        margin: 10px 0 0;
        line-height: 1.65;
        color: var(--muted);
      }

      .dock {
        position: absolute;
        left: 50%;
        bottom: 26px;
        transform: translateX(-50%);
        pointer-events: none;
      }

      .wave-anchor {
        position: relative;
        min-width: 76px;
        height: 42px;
        border-radius: 999px;
        padding: 0 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.72));
        border: 1px solid rgba(255, 255, 255, 0.95);
        box-shadow:
          0 18px 42px rgba(60, 37, 18, 0.12),
          0 0 0 8px rgba(255, 171, 108, 0.08);
        backdrop-filter: blur(24px);
        pointer-events: auto;
      }

      .wave-anchor::before {
        content: "";
        position: absolute;
        inset: auto 22px -14px;
        height: 28px;
        border-radius: 999px;
        background: rgba(255, 173, 112, 0.18);
        filter: blur(18px);
        z-index: -1;
      }

      .wave-anchor[data-state="idle"] {
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0.66));
        box-shadow: 0 16px 34px rgba(60, 37, 18, 0.08);
      }

      .wave-strip {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0;
      }

      .wave-strip span {
        width: 4px;
        border-radius: 999px;
        background: linear-gradient(180deg, #ffc883, #ff8e4c);
        animation: pulse 1.1s ease-in-out infinite;
        transform-origin: center;
      }

      .wave-strip span:nth-child(1) { height: 14px; animation-delay: -0.2s; }
      .wave-strip span:nth-child(2) { height: 24px; animation-delay: -0.45s; }
      .wave-strip span:nth-child(3) { height: 34px; animation-delay: -0.1s; }
      .wave-strip span:nth-child(4) { height: 26px; animation-delay: -0.35s; }
      .wave-strip span:nth-child(5) { height: 16px; animation-delay: -0.15s; }

      .toggle {
        position: absolute;
        top: -62px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }

      .toggle button {
        height: 40px;
        padding: 0 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.78);
        color: rgba(25, 22, 18, 0.7);
        border: 1px solid rgba(25, 22, 18, 0.06);
        box-shadow: 0 12px 24px rgba(47, 32, 18, 0.08);
      }

      .toggle button.active {
        background: #17120e;
        color: white;
      }

      @keyframes pulse {
        0%, 100% { transform: scaleY(0.62); opacity: 0.46; }
        50% { transform: scaleY(1.05); opacity: 1; }
      }

      @media (max-width: 900px) {
        .floating-note {
          width: auto;
        }

        .toggle {
          top: 12px;
          left: 50%;
          transform: translateX(-50%);
        }
      }
    </style>
  </head>
  <body>
    <main class="desktop">
      <section class="floating-note">
        <h1>iterate-speech 底边语音条</h1>
        <p>
          这个原型不再弹完整应用窗口，而是把 iOS 底部语音区桌面化。
          按 <strong>Fn</strong> 后，只从底边弹出一条轻量语音条，显示实时状态、实时文本和确认动作。
        </p>
      </section>

      <section class="dock">
        <div class="toggle">
          <button class="active" data-state="listening">正在输入</button>
          <button data-state="idle">待命</button>
        </div>

        <div class="wave-anchor" data-state="listening" id="wave-anchor">
          <div class="wave-strip" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </section>
    </main>

    <script>
      const states = {
        listening: {},
        idle: {}
      }

      const waveAnchor = document.getElementById('wave-anchor');

      document.querySelectorAll('[data-state]').forEach((button) => {
        button.addEventListener('click', () => {
          const next = states[button.dataset.state];
          document.querySelectorAll('[data-state]').forEach((item) => item.classList.remove('active'));
          button.classList.add('active');
          waveAnchor.dataset.state = button.dataset.state;
        });
      });
    </script>
  </body>
</html>
